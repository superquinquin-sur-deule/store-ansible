---
- name: Install zip package
  ansible.builtin.apt:
    name: zip
    state: present

- name: Update Firefox policies
  firefox_policies:
    path: /usr/lib/firefox-esr/distribution/policies.json
    policies: "{{ firefox_extension_policies }}"

- name: Create extension directory
  ansible.builtin.file:
    path: "{{ firefox_extension_dir }}"
    state: directory
    mode: "0755"

- name: Deploy extension script
  ansible.builtin.template:
    src: content.js.j2
    dest: "{{ firefox_extension_dir }}/content.js"
    mode: "0644"
  notify: deploy-extension
