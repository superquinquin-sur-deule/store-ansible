---
- name: Ensure /var/log is mounted as tmpfs
  ansible.builtin.mount:
    src: tmpfs
    path: /var/log
    state: mounted
    opts: "defaults,noatime,nodev,nosuid,noexec,mode=0755,size=200M"
    fstype: tmpfs

- name: Create tmpfiles rule for critical logs
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/kiosk-logs.conf
    mode: "0644"
    content: |
      d /var/log/journal 2755 root systemd-journal -
      d /var/log/journal/{{ ansible_machine_id }} 2755 root systemd-journal -
      d /var/log/apt 0755 root root
      d /var/log/dbus 0755 messagebus messagebus
      d /var/log/runit 0755 root root -
      d /var/log/runit/ssh 0755 root root -
      f /var/log/lastlog 0664 root utmp -
  notify:
    - create-tmpfiles
    - restart-journald

- name: Configure journald storage
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^#?Storage=", line: "Storage=persistent" }
    - { regexp: "^#?SystemMaxUse=", line: "SystemMaxUse=50M" }
    - { regexp: "^#?MaxRetentionSec=", line: "MaxRetentionSec=1day" }
  notify: restart-journald

- name: Trigger critical handlers now
  meta: flush_handlers
